name: ci

on:
  pull_request:
    branches: [ main ]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: run unit tests
        run: go test ./... -cover

      - name: install gosec for security check
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: check security issues
        run: gosec ./...

  style:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: check formatting issues
        run: test -z $(go fmt ./...)

      - name: check linting issues
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
